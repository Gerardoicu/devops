  <g font-family="Arial, sans-serif">
    <rect x="70" y="120" width="280" height="120" rx="22" fill="#152032" stroke="#8fc3ff"/>
    <text x="210" y="160" fill="#cfe6ff" font-size="22" text-anchor="middle">Stack original</text>
    <rect x="120" y="185" width="180" height="35" rx="10" fill="#17304a" stroke="#8fc3ff"/><text x="210" y="208" fill="#fff" font-size="15" text-anchor="middle">DeletionPolicy: Retain</text>
    <rect x="470" y="135" width="300" height="90" rx="20" fill="#1a2f23" stroke="#9fe3b1"/>
