<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 360" role="img" aria-label="Route53 routing policies">
  <rect width="1320" height="360" fill="#0f1218"/>
  <text x="34" y="40" fill="#f1b356" font-family="Arial, sans-serif" font-size="26" font-weight="700">Route 53: failover, weighted y latency-based</text>
  <g font-family="Arial, sans-serif">
    <rect x="540" y="60" width="240" height="70" rx="18" fill="#17304a" stroke="#8fc3ff"/>
    <text x="660" y="103" fill="#fff" font-size="24" text-anchor="middle">Route 53</text>
    <rect x="90" y="190" width="260" height="95" rx="18" fill="#1a2f23" stroke="#9fe3b1"/>
    <text x="220" y="228" fill="#fff" font-size="22" text-anchor="middle">Failover</text>
    <text x="220" y="254" fill="#dff5e6" font-size="15" text-anchor="middle">Primario / secundario</text>
    <rect x="530" y="190" width="260" height="95" rx="18" fill="#3a2415" stroke="#f1b356"/>
    <text x="660" y="228" fill="#fff" font-size="22" text-anchor="middle">Weighted</text>
    <text x="660" y="254" fill="#ffe8c2" font-size="15" text-anchor="middle">Reparto porcentual</text>
    <rect x="970" y="190" width="260" height="95" rx="18" fill="#22171a" stroke="#ff9f9f"/>
    <text x="1100" y="228" fill="#fff" font-size="22" text-anchor="middle">Latency-based</text>
    <text x="1100" y="254" fill="#ffd8d8" font-size="15" text-anchor="middle">Menor latencia</text>
  </g>
  <path d="M660 130 V190 M660 190 H350 M660 190 V190 M660 190 H530 M660 190 H970" stroke="#9fd1ff" stroke-width="6" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#9fd1ff"/></marker></defs>
